name: CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: user_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASS: root
      DB_NAME: user_db
      JWT_SECRET: test_secret
      PORT: 5000
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: user-management-api/package-lock.json

      - name: Install dependencies
        working-directory: user-management-api
        run: npm install

      - name: Install Playwright browsers
        working-directory: user-management-api
        run: npx playwright install --with-deps

      - name: Run migrations
        working-directory: user-management-api
        run: npx sequelize-cli db:migrate

      - name: Run Playwright tests
        working-directory: user-management-api
        run: npm run test:ui

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: user-management-api/playwright-report/
          retention-days: 10
